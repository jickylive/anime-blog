title: 黄氏寻宗
subtitle: 一个黄氏宗族历史记录网站
description: 黄氏宗族历史记录网站 - 寻根问祖，族谱查询，字辈查询，黄姓家族文化传承
keywords: 黄氏，族谱，寻根，字辈，宗亲会，家族文化，黄姓，家谱，姓氏文化，祖先
author: jicky huang
language: zh-CN
timezone: Asia/Shanghai
url: https://www.hxfund.cn/blog
root: /blog/
permalink: ':year/:month/:day/:title/'
permalink_defaults: null
pretty_urls:
  trailing_index: true
  trailing_html: true
source_dir: source
public_dir: E:/website/hxfund/dist/blog
scripts_dir: _scripts_disabled
code_dir: downloads/code
i18n_dir: ':lang'
skip_render: null
new_post_name: ':title.md'
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
index_generator:
  path: ''
  per_page: 20
  order_by: '-date'
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page
include: null
exclude: null
ignore:
  - scripts/**/*.sh
  - scripts/**/*.md
  - scripts/**/*.conf
  - scripts/**/*.bat
theme: defaultone
search:
  path: search.xml
  field: post
  format: html
  content_limit: 200
  content_limit_delim: ' '
feed:
  type: atom
  path: atom.xml
  limit: 30
  hub: null
  content: null
  content_limit: 200
  content_limit_delim: ' '
  order_by: '-date'
live2d:
  enable: true
  scriptFrom: local
  pluginRootPath: live2dw/
  pluginJsPath: lib/
  pluginModelPath: assets/
  tagMode: false
  log: false
  model:
    use: live2d-widget-model-wanko
  display:
    position: right
    width: 150
    height: 300
  mobile:
    show: true
  react:
    opacity: 0.7
