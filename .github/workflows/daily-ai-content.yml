# .github/workflows/daily-ai-content.yml
# 每日AI生成内容工作流
name: Daily AI Content Generation

on:
  schedule:
    # 北京时间每天早上8点运行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行'
        required: false
        type: boolean
        default: false

# 并发控制
concurrency:
  group: daily-ai-content-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-content:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run daily-news.js script for AI content generation
        run: |
          echo "Starting AI content generation..."
          node daily-news.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}

      - name: Check for changes and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Changes detected, committing and pushing..."
            git add .
            git commit -m "🤖 Daily AI Content: $(date +'%Y-%m-%d')" -m "AI-generated daily news and updates"
            git push origin main
            echo "Changes committed and pushed successfully."
          else
            echo "No changes detected."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}