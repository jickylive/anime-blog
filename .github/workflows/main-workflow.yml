# .github/workflows/main-workflow.yml
# 统一的Anime Blog工作流，整合每日AI生成内容、Hexo静态页面生成、部署到阿里云FTP和GitHub Pages
name: Main Workflow - Daily AI & Deploy

on:
  # 每日AI生成内容触发
  schedule:
    # 北京时间每天早上8点运行 (UTC 0:00)
    - cron: '0 0 * * *'

  # 主分支更新时触发部署
  push:
    branches:
      - main
    paths:
      - 'source/**'
      - 'public/**'
      - 'package*.json'
      - '_config*.yml'
      - 'daily-news.js'
      - '.github/workflows/main-workflow.yml'

  # 手动触发
  workflow_dispatch:
    inputs:
      action_type:
        description: '操作类型'
        required: true
        default: 'full-deploy'
        type: choice
        options:
          - ai-generation # 仅AI内容生成
          - build-only # 仅构建
          - deploy-only # 仅部署
          - full-deploy # 完整部署（构建+部署）
          - github-pages-only # 仅发布到GitHub Pages

# 并发控制
concurrency:
  group: main-workflow-${{ github.ref }}-${{ inputs.action_type || 'scheduled' }}
  cancel-in-progress: true

jobs:
  # AI生成内容作业
  ai-generation:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' ||
           (github.event_name == 'workflow_dispatch' && contains(fromJSON('["ai-generation", "full-deploy"]'), inputs.action_type)) ||
           (github.event_name == 'push' && contains(github.event.head_commit.message, '[ai-gen]')) }}

    permissions:
      contents: write
      pull-requests: write

    outputs:
      changes_detected: ${{ steps.changes.outputs.has_changes == 'true' }}
      post_created: ${{ steps.post_check.outputs.post_created || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        if: ${{ github.event_name != 'schedule' }}

      - name: Run daily-news.js script for AI content generation
        run: node daily-news.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}

      - name: Check for changes
        id: changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 检查是否有任何更改
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Detected changes in the repository"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and Push changes if AI generated content
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add .
          git commit -m "🤖 AI Generated: New daily content $(date +'%Y-%m-%d')" -m "Generated by automated workflow"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set post creation flag
        id: post_check
        run: |
          if ls source/_posts/daily-news-*.md 1> /dev/null 2>&1; then
            echo "post_created=true" >> $GITHUB_OUTPUT
          else
            echo "post_created=false" >> $GITHUB_OUTPUT
          fi

  # 构建Hexo静态网站
  build:
    runs-on: ubuntu-latest
    needs: ai-generation
    if: ${{
          github.event_name == 'schedule' && needs.ai-generation.outputs.post_created == 'true' ||
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && contains(fromJSON('["build-only", "deploy-only", "full-deploy"]'), inputs.action_type)) ||
          needs.ai-generation.outputs.changes_detected == 'true'
        }}

    permissions:
      contents: read

    outputs:
      build_success: ${{ steps.build_check.outputs.success }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          npm ci --only=production --ignore-scripts
          npm install --only=dev

      - name: Clean and generate static files
        run: |
          npx hexo clean
          npx hexo generate --bail
        env:
          NODE_ENV: production

      - name: Verify build output
        id: build_check
        run: |
          if [ -f public/index.html ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ Build successful - index.html exists"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Build failed - index.html missing"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hexo-static-files
          path: public/
          retention-days: 7
          if-no-files-found: error

  # 部署到阿里云FTP主机（子目录）
  deploy-aliyun-ftp:
    runs-on: ubuntu-latest
    needs: build
    if: ${{
          needs.build.outputs.build_success == 'true' &&
          (github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && contains(fromJSON('["deploy-only", "full-deploy"]'), inputs.action_type)))
        }}

    permissions:
      contents: read

    environment:
      name: production
      url: https://www.hxfund.cn/blog/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: hexo-static-files
          path: public/

      - name: Deploy to Aliyun FTP (/blog subdirectory)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: public/
          server-dir: /htdocs/public/blog/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
          dangerous-clean-slate: false

      - name: Deployment notification
        if: always()
        run: echo "::notice::部署到阿里云FTP主机(/blog) ${{ job.status }}"

  # 部署到GitHub Pages
  deploy-github-pages:
    runs-on: ubuntu-latest
    needs: build
    if: ${{
          needs.build.outputs.build_success == 'true' &&
          (github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && contains(fromJSON('["deploy-only", "full-deploy", "github-pages-only"]'), inputs.action_type)))
        }}

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: hexo-static-files
          path: public/

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

      - name: Deployment notification
        if: always()
        run: echo "::notice::部署到 GitHub Pages ${{ job.status }}"

  # 可选：部署到主站点（Aliyun ESA）
  deploy-main-site:
    runs-on: ubuntu-latest
    needs: [build, deploy-aliyun-ftp, deploy-github-pages]
    if: ${{
          github.ref == 'refs/heads/main' &&
          needs.build.outputs.build_success == 'true' &&
          (github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.action_type == 'full-deploy'))
        }}

    permissions:
      contents: read
      deployments: write

    environment:
      name: production
      url: https://www.hxfund.cn

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: hexo-static-files
          path: public/

      - name: Deploy to Aliyun ESA via SSH
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.ESA_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.ESA_HOST }}
          REMOTE_USER: ${{ secrets.ESA_USER }}
          REMOTE_PORT: ${{ secrets.ESA_PORT || '22' }}
          SOURCE: public/
          TARGET: ${{ secrets.ESA_TARGET || '/var/www/html' }}
          EXCLUDE: "/build/, /node_modules/, /.git/"
          ARGS: "-rltgoDzvO --delete --compress"

      - name: Purge ESA Cache (Optional)
        if: always()
        run: |
          curl -X POST "https://esapush.aliyuncs.com/push" \
            -H "Authorization: Bearer ${{ secrets.ESA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "refresh",
              "objects": [
                "https://www.hxfund.cn/",
                "https://www.hxfund.cn/*"
              ]
            }' || echo "缓存刷新失败，但部署已完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment notification
        if: always()
        run: echo "::notice::部署到 Aliyun ESA (www.hxfund.cn) ${{ job.status }}"