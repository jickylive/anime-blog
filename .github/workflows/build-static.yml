# .github/workflows/build-static.yml
# Hexo静态页面构建工作流
name: Build Hexo Static Pages

on:
  push:
    branches:
      - main
    paths:
      - 'source/**'
      - 'public/**'
      - 'package*.json'
      - '_config*.yml'
      - 'themes/**'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: '重新构建全部页面'
        required: false
        type: boolean
        default: false

# 并发控制
concurrency:
  group: build-static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      build_success: ${{ steps.verify.outputs.success }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          npm ci --only=production --ignore-scripts
          npm install --only=dev

      - name: Clean and generate static files
        run: |
          npx hexo clean
          npx hexo generate --bail
        env:
          NODE_ENV: production

      - name: Verify build output
        id: verify
        run: |
          if [ -f public/index.html ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ Build successful - index.html exists"
            echo "Files generated:"
            find public -type f | wc -l
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Build failed - index.html missing"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hexo-static-files
          path: public/
          retention-days: 7
          if-no-files-found: error

      - name: Build notification
        if: always()
        run: echo "::notice::Hexo静态页面构建 ${{ job.status }}"