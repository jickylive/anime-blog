name: Generate and Push Daily News Post

on:
  schedule:
    # 每天 UTC 时间凌晨 0 点 30 分运行
    # 请根据需要调整 cron 表达式
    - cron: '30 0 * * *'
  workflow_dispatch:
    # 允许手动在 GitHub 页面上触发此工作流

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 这一步非常关键！
          # 需要提供一个具有写入权限的令牌来推送更改。
          # github.token 是 GitHub Actions 提供的默认令牌，
          # 通常具有仓库的写入权限（如果 repo scope 权限没被特别限制）。
          token: ${{ secrets.GITHUB_TOKEN }} # 使用内置的 GITHUB_TOKEN

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 或者你 daily-news.js 所需的版本

      - name: Install dependencies (if any)
        run: npm install # 如果你的 daily-news.js 有依赖，需要安装
        
      # ===============================================================
      # 新增步骤：安装 Hexo CLI
      - name: Install Hexo CLI
        run: npm install -g hexo-cli
      # ===============================================================


      - name: Run daily-news.js script
        run: node daily-news.js
        # 确保 daily-news.js 脚本会在仓库中生成新的文件，
        # 比如在某个 posts/ 目录下生成 daily-news-YYYY-MM-DD.md 文件
        env:
          # 在这里注入 GEMINI_API_KEY 环境变量
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 如果你的脚本还需要其他环境变量，也可以在这里添加
          # ANOTHER_VAR: ${{ secrets.ANOTHER_SECRET }}

      - name: Check for changes
        id: git_status
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 检查是否有新的文件或修改
          git add .
          git diff --staged --quiet || echo "::set-output name=has_changes::true"
          
          # 或者更简单的判断是否有变化
          # if [[ $(git status --porcelain) ]]; then echo "::set-output name=has_changes::true"; fi

      - name: Commit and Push changes
        if: steps.git_status.outputs.has_changes == 'true'
        run: |
          git add . # 再次确保所有新生成/修改的文件都被添加
          git commit -m "feat: Add new daily news post generated by Actions 🤖"
          # 如果你的仓库有多个分支，确保推送到正确的分支，例如 main
          git push origin main
        env:
          # 再次明确设置用于推送的令牌，尽管 checkout 步骤已经设置了
          # 但为了 Git 推送命令的顺利执行，建议也在这里设置 SSH 或 HTTPS 凭证
          # 这里的 GITHUB_TOKEN 会通过 actions/checkout@v4 自动配置 HTTPS 凭证
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}