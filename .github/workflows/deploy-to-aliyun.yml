# .github/workflows/main.yml (示例片段)
name: Hexo Deploy to Aliyun

on:
  push:
    branches:
      - main  # 你的主分支名
    paths:
      - 'source/**'
      - 'public/**'

jobs:
  deploy:
    runs-on: self-hosted
    
    # 将 Secrets 注入到环境变量中
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 确保安装了 Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      # 安装 Hexo CLI 和 ftpsync 依赖
      - name: Install Dependencies
        run: |
          npm install -g hexo-cli
          npm install

      # 运行脚本生成包含 Secrets 的临时配置
      - name: Generate Deploy Config
        run: node generate_deploy_config.js

      # 生成静态文件并部署
      - name: Generate and Deploy
        run: |
          hexo clean
          hexo generate
          # 使用 --config 参数合并主配置和机密配置
          hexo deploy --config _config.yml,_config.deploy.yml
        
      # 可选：清理机密文件
      - name: Clean up secret file
        run: rm _config.deploy.yml