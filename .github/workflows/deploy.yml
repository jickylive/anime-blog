# .github/workflows/deploy.yml
name: Deploy to Aliyun ESA - Main Site

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# 并发控制
concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          npm ci --only=production --ignore-scripts
          npm install --only=dev

      - name: Security audit
        continue-on-error: true
        run: npm audit --audit-level=high || true

      - name: Generate static files
        run: |
          npx hexo clean
          npx hexo generate --bail
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-files
          path: public/
          retention-days: 7
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      deployments: write

    environment:
      name: production
      url: https://www.hxfund.cn

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: public-files
          path: public/

      - name: Deploy to Aliyun ESA via SSH
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.ESA_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.ESA_HOST }}
          REMOTE_USER: ${{ secrets.ESA_USER }}
          REMOTE_PORT: ${{ secrets.ESA_PORT || '22' }}
          SOURCE: public/
          TARGET: ${{ secrets.ESA_TARGET || '/var/www/html' }}
          EXCLUDE: "/build/, /node_modules/, /.git/"
          ARGS: "-rltgoDzvO --delete --compress"

      - name: Purge ESA Cache
        if: always()
        run: |
          curl -X POST "https://esapush.aliyuncs.com/push" \
            -H "Authorization: Bearer ${{ secrets.ESA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "refresh",
              "objects": [
                "https://www.hxfund.cn/",
                "https://www.hxfund.cn/*"
              ]
            }' || echo "缓存刷新失败，但部署已完成"

      - name: Deployment notification
        if: always()
        run: echo "::notice::部署到 Aliyun ESA (www.hxfund.cn) ${{ job.status }}"
