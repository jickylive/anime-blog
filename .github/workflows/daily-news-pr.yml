# .github/workflows/daily-news-pr.yml

name: Generate Daily News and Create PR

on:
  # 定时触发
  schedule:
    - cron: '0 12 * * *' # 每天 UTC 12:00 (北京时间 20:00)

  # 手动触发
  workflow_dispatch:

jobs:
  create-new-post-pr:
    # runs-on: ubuntu-latest|instance-20220911-2339
    runs-on: self-hosted
    # ===============================================================
    # ⚠️ 新增这个 permissions 块，明确赋予写入权限
    permissions:
      contents: write # 允许工作流写入仓库内容
      # 如果你的工作流还涉及到 issue, pull-requests, packages 等，可能需要更多权限
      pull-requests: write # 如果你需要创建 PR
    # ===============================================================

    steps:
      # 第 1 步：检出你的 main 分支代码
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          # 这一步非常关键！
          # 需要提供一个具有写入权限的令牌来推送更改。
          # github.token 是 GitHub Actions 提供的默认令牌，
          # 通常具有仓库的写入权限（如果 repo scope 权限没被特别限制）。
          token: ${{ secrets.GITHUB_TOKEN }} # 使用内置的 GITHUB_TOKEN

      # 第 2 步：设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 第 3 步：安装项目依赖
      - name: Install dependencies
        run: npm install

      # 第 4 步：执行 daily-news.js 脚本来生成新文章
      - name: Run daily-news script
        run: node daily-news.js
        env:
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
      # 第 5 步：创建新的分支和 Pull Request
      # 这个 Action 会自动处理：检查文件变动、创建分支、提交代码、推送分支、创建PR
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          # 用于提交代码的作者信息
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          token: ${{ secrets.GITHUB_TOKEN }} # 使用内置的 GITHUB_TOKEN

          # 自动生成一个包含当天日期的分支名，例如：news/2025-10-01
          branch: "news/daily-post-${{ steps.cpr.outputs.pr_number || 'new' }}" # 使用动态分支名
          
          # 提交信息
          commit-message: "docs: ✨ Add daily news post for $(date +'%Y-%m-%d')"
          
          # Pull Request 的标题和内容
          title: "📰 Daily News Post for ${{ steps.cpr.outputs.pr_date || '$(date +''%Y-%m-%d'')' }}"
          body: |
            This is an auto-generated daily news post.
            
            Please review the content and merge this PR to publish the article.
            
            - **Branch:** `${{ steps.cpr.outputs.pr_branch }}`
            - **Pull Request:** `${{ steps.cpr.outputs.pr_url }}`

          # 为 PR 添加标签，方便分类
          labels: "automated, blog-post, daily-news"
          
          # 如果您想指定审核人，可以取消下面的注释
          # reviewers: jickylive
          
          # 如果文件没有变化，则不创建 PR
          delete-branch: true # 合并后自动删除分支
        env:
          # 再次明确设置用于推送的令牌，尽管 checkout 步骤已经设置了
          # 但为了 Git 推送命令的顺利执行，建议也在这里设置 SSH 或 HTTPS 凭证
          # 这里的 GITHUB_TOKEN 会通过 actions/checkout@v4 自动配置 HTTPS 凭证
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # (可选) 检查 PR 是否被创建的步骤
      - name: Check Pull Request Outputs
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
            echo "Pull Request Number: ${{ steps.cpr.outputs.pull-request-number }}"
            echo "Pull Request URL: ${{ steps.cpr.outputs.pull-request-url }}"